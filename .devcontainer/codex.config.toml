# ==========================================
# GLOBAL SETTINGS & DEFAULTS
# ==========================================
model = "qwen3.5-plus"
model_provider = "proxy_ai"
model_catalog_json = "/home/vscode/custom_models.json"
disabled_providers = ["opencode"]
model_reasoning_effort = "high"

# MCP Server Configuration
mcp_server_url = "ws://localhost:9095"
mcp_agent_id = "codex-agent"
mcp_agent_capabilities = ["coder", "reviewer", "planner"]

# ==========================================
# PROVIDER DEFINITIONS
# ==========================================

[model_providers.proxy_ai]
name = "proxy"
base_url = "http://host.docker.internal:8080/v1/anthropic-to-openai"
api_key = "sk-cp-dummy"

[model_providers.proxy_ai_anthropic]
name = "proxy-anthropic"
base_url = "http://host.docker.internal:8080/v1"
api_key = "sk-cp-dummy"
provider_type = "anthropic"
npm_package = "@ai-sdk/anthropic"

[model_providers.alibaba_anthropic]
name = "alibaba-anthropic"
base_url = "https://coding-intl.dashscope.aliyuncs.com/apps/anthropic/v1"
env_key = "ALIBABA_API_KEY"
provider_type = "anthropic"
npm_package = "@ai-sdk/anthropic"

[model_providers.alibaba_coding_plan]
name = "Alibaba Coding Plan"
base_url = "https://coding-intl.dashscope.aliyuncs.com/v1"
env_key = "ALIBABA_API_KEY"
npm_package = "@ai-sdk/openai-compatible"

# ==========================================
# MODEL PROFILES (WITH ALL PARAMETERS)
# ==========================================

# --- Proxy AI Models ---
[profiles."proxy-ai/Kimi-K2.5-TEE"]
model_provider = "proxy_ai"
model = "moonshotai/Kimi-K2.5-TEE"
context_window = 262144
max_output = 262144
modalities = ["text", "image", "video"]
reasoning_field = "reasoning_content"
thinking_budget = 81920
structured_output = true
temperature = 0.0

# --- Proxy AI Anthropic Models ---
[profiles."proxy-anthropic/kimi-k2.5"]
model_provider = "proxy_ai_anthropic"
model = "kimi-k2.5"
context_window = 262144
max_output = 262144
modalities = ["text", "image", "video"]
reasoning_field = "reasoning_content"
thinking_budget = 81920
structured_output = true

[profiles."proxy-anthropic/glm-5"]
model_provider = "proxy_ai_anthropic"
model = "glm-5"
context_window = 202752
max_output = 16384
modalities = ["text"]
thinking_budget = 8196

# --- Alibaba Anthropic Models ---
[profiles."alibaba-anthropic/kimi-k2.5"]
model_provider = "alibaba_anthropic"
model = "kimi-k2.5"
context_window = 262144
max_output = 262144
modalities = ["text", "image", "video"]
reasoning_field = "reasoning_content"

[profiles."alibaba-anthropic/qwen3.5-plus"]
